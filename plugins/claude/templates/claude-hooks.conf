# Claude hook configuration template
#
# Copy or rely on the dotconfigs deploy to place this at one of:
#   ~/.claude/claude-hooks.conf            (global)
#   <project>/.claude/claude-hooks.conf    (project — wins over global)
#
# Every guard defaults to "true" if unset, so this file only needs entries
# you want to override. The full set is generated from hook METADATA into
# docs/ROSTER.md.

# --- Safety guards (PreToolUse) ---

# Guard against destructive bash commands (rm -rf /, git push --force without
# --force-with-lease, git reset --hard, git clean -fd, DROP TABLE/DATABASE,
# chmod -R 777). Toggles all the destructive-pattern split scripts together.
CLAUDE_HOOK_DESTRUCTIVE_GUARD=true

# Protect sensitive files from Write/Edit (.pem, credentials, .env.production,
# SSH private keys).
CLAUDE_HOOK_FILE_PROTECTION=true

# Block unsolicited GitHub PR/issue comments via gh CLI and the GitHub MCP.
# Prefix one-off gh calls with GH_COMMENT_OK=1 to bypass.
CLAUDE_HOOK_GH_COMMENT_GUARD=true

# Strip AI attribution from PR titles and descriptions.
CLAUDE_HOOK_PR_ATTRIBUTION_GUARD=true

# --- Context and telemetry ---

# Prepend [context: branch=X | dirty=N | head=<sha> <subject>] to every prompt
# (UserPromptSubmit hook). Saves Claude redundant git-status calls. No-op
# outside git repos.
CLAUDE_HOOK_PROMPT_CONTEXT=true

# Detect .venv at session start and export VIRTUAL_ENV + PATH via
# CLAUDE_ENV_FILE so the session inherits the project's Python env without
# manual activation.
CLAUDE_HOOK_VENV_AUTO=true

# Append a JSONL row to ~/.claude/session-log.jsonl when each session ends
# (timestamp, session_id, duration, model, project_dir).
CLAUDE_HOOK_SESSION_LOG=true

# Copy the session transcript to ~/.claude/snapshots/<session>-precompact.jsonl
# before each context compaction. Cheap recovery insurance.
CLAUDE_HOOK_PRECOMPACT_SNAPSHOT=true

# --- Notifications ---

# ntfy.sh push fan-out on Notification events. Only fires when $NTFY_TOPIC is
# set in your environment (the topic name is user-specific and never committed).
CLAUDE_HOOK_NOTIFY_NTFY=true

# Desktop notify-send fan-out on Notification events. Only fires when
# $DISPLAY or $WAYLAND_DISPLAY is set (SSH sessions silently skip).
CLAUDE_HOOK_NOTIFY_DESKTOP=true
