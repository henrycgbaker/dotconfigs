# Claude hook configuration template
#
# Copy to one of these locations to opt out of (or back into) hook guards:
#   ~/.claude/claude-hooks.conf            (global)
#   <project>/.claude/claude-hooks.conf    (project — wins over global)
#
# Every guard defaults to "true" if unset, so this file only needs entries
# you want to override. The full set is generated from hook METADATA into
# docs/ROSTER.md.

# Guard against destructive bash commands (rm -rf /, etc.).
CLAUDE_HOOK_DESTRUCTIVE_GUARD=true

# Protect critical files from modification.
CLAUDE_HOOK_FILE_PROTECTION=true

# Block unsolicited GitHub PR/issue comments via gh CLI and the GitHub MCP.
# Prefix one-off gh calls with GH_COMMENT_OK=1 to bypass.
CLAUDE_HOOK_GH_COMMENT_GUARD=true

# Strip AI attribution from PR titles and descriptions.
CLAUDE_HOOK_PR_ATTRIBUTION_GUARD=true
